name: Build Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Установить Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue | Select -First 1
          if (-not $iscc) { $iscc = Get-ChildItem "C:\Program Files\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue | Select -First 1 }
          if (-not $iscc) { throw "ISCC.exe не появился" }
          Write-Host "ISCC: $($iscc.FullName)"

      - name: Сборка
        shell: pwsh
        env:
          TEMP: C:\temp\build
        run: |
          $ErrorActionPreference = "Stop"
          $src = $env:GITHUB_WORKSPACE
          $buildDir = "$env:TEMP\LazyCommentsBuild"

          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null

          Copy-Item "$src\lazy_comments.py"       "$buildDir\"
          Copy-Item "$src\lazy_comments.ico"       "$buildDir\"
          Copy-Item "$src\lazy_comments.iss"      "$buildDir\"
          Copy-Item "$src\lazy_comments.spec"      "$buildDir\"
          Copy-Item "$src\app.py"                "$buildDir\"
          Copy-Item -Recurse "$src\lazy_comments" "$buildDir\"

          Push-Location $buildDir
          pyinstaller --noconfirm lazy_comments.spec
          Pop-Location

          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue | Select -First 1
          if (-not $iscc) { $iscc = Get-ChildItem "C:\Program Files\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue | Select -First 1 }
          if (-not $iscc) { throw "ISCC.exe не найден" }
          Write-Host "ISCC: $($iscc.FullName)"

          & $iscc.FullName "$buildDir\lazy_comments.iss"

          New-Item -ItemType Directory -Force -Path "$src\installer" | Out-Null
          Copy-Item "$buildDir\installer\lazy_comments-setup.exe" "$src\installer\"

      - name: Скачать готовый файл
        uses: actions/upload-artifact@v4
        with:
          name: lazy-comments-setup
          path: installer/lazy_comments-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lazy-comments-setup

      - uses: softprops/action-gh-release@v2
        with:
          files: lazy_comments-setup.exe
          generate_release_notes: true
